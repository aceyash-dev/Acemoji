<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acemoji</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&family=Noto+Sans&family=Noto+Sans+Symbols&family=Noto+Sans+Symbols+2&family=Noto+Sans+Math&display=swap" rel="stylesheet">
    
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
    <style>
        /* Smooth Scrolling */
        html { scroll-behavior: smooth; }

        /* Premium Blurple Theme (Dark - Default) */
        :root {
            --bg-color: #0d0c14;
            --surface-color: rgba(26, 23, 38, 0.7);
            --surface-hover: rgba(35, 31, 51, 0.85);
            --border-color: rgba(187, 134, 252, 0.15);
            --border-focus: rgba(187, 134, 252, 0.5);
            --text-primary: #ffffff;
            --text-secondary: #a39eb5;
            --accent-color: #bb86fc;
            --accent-hover: #d4b3ff;
            --success-color: #03dac6;
            --success-bg: rgba(3, 218, 198, 0.1);
            --border-radius: 16px;
            --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --unicode-font-stack: "Noto Color Emoji", "Apple Color Emoji", "Segoe UI Emoji", "Twemoji Mozilla", "Noto Sans Symbols 2", "Noto Sans Symbols", "Noto Sans Math", "Segoe UI Symbol", "Apple Symbols", system-ui, sans-serif;
        }

        /* Light Theme Override */
        body.light {
            --bg-color: #f5f5f7;
            --text-primary: #111111;
            --text-secondary: #555555;
            --accent-color: #6c5ce7;
            --accent-hover: #4834d4;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top, rgba(187, 134, 252, 0.08) 0%, transparent 50%);
            color: var(--text-primary);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background-color var(--transition), color var(--transition);
            overflow-x: hidden;
        }

        /* GLOBAL GLASSMORPHISM UTILITY */
        .glass {
            background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 8px 32px rgba(0,0,0,0.25);
            border-radius: var(--border-radius);
        }

        body.light .glass {
            background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,255,255,0.4));
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: inset 0 1px 0 rgba(255,255,255,1), 0 8px 32px rgba(0,0,0,0.08);
        }

        /* Sticky Header */
        header {
            text-align: center;
            margin-bottom: 24px;
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: sticky;
            top: 0;
            background: linear-gradient(to bottom, var(--bg-color) 70%, transparent);
            z-index: 20;
            padding: 15px 0 20px 0;
            margin-top: -16px; 
            transition: background var(--transition);
        }

        .header-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 12px;
        }

        .stats-badge {
            font-size: 0.8rem;
            padding: 6px 14px;
            border-radius: 20px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            padding: 8px;
            border-radius: 20px;
            margin-bottom: 24px;
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 15;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-secondary);
            border-radius: 12px;
            cursor: pointer;
            transition: all var(--transition);
        }

        .tab-btn:hover { color: var(--text-primary); background: rgba(187, 134, 252, 0.05); }
        .tab-btn.active {
            background: rgba(187, 134, 252, 0.2);
            color: var(--accent-color);
            box-shadow: inset 0 0 0 1px var(--border-focus);
        }
        body.light .tab-btn.active { background: rgba(108, 92, 231, 0.15); }

        /* Search */
        .search-container {
            width: 100%;
            max-width: 700px;
            margin-bottom: 20px;
            position: sticky;
            top: 100px;
            z-index: 15;
            border-radius: 24px;
        }

        .search-input {
            width: 100%;
            padding: 18px 20px 18px 55px;
            font-size: 1.05rem;
            background: transparent;
            border: none;
            color: var(--text-primary);
            box-sizing: border-box;
            transition: all var(--transition);
            border-radius: 24px;
        }

        .search-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--accent-color), 0 0 30px rgba(187, 134, 252, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            pointer-events: none;
        }

        /* Category Pills */
        .category-scroll {
            width: 100%;
            max-width: 1200px;
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            gap: 10px;
            padding-bottom: 15px;
            margin-bottom: 10px;
            scrollbar-width: none;
        }
        .category-scroll::-webkit-scrollbar { display: none; }

        .category-pill {
            color: var(--text-secondary);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            flex-shrink: 0;
            border: 1px solid transparent;
        }
        .category-pill:hover { border-color: var(--accent-color); color: var(--text-primary); }
        .category-pill.active {
            background: var(--accent-color);
            color: #fff;
            border-color: var(--accent-color);
            box-shadow: 0 4px 15px rgba(187, 134, 252, 0.35);
        }

        /* Featured Emoji Panel (Hero) */
        .featured-card {
            width: 100%;
            padding: 30px 20px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-radius: 24px;
            position: relative;
            overflow: hidden;
            display: none; 
        }

        .featured-card::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at center, rgba(187,134,252,0.1) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
        }

        .featured-emoji {
            font-size: 5rem;
            line-height: 1;
            margin-bottom: 5px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }

        .featured-title { font-size: 1.5rem; font-weight: 800; margin: 0; text-transform: capitalize; }
        .featured-meta {
            font-family: 'Courier New', Courier, monospace;
            color: var(--accent-color);
            font-weight: bold;
            font-size: 0.9rem;
            background: rgba(187, 134, 252, 0.1);
            padding: 4px 12px;
            border-radius: 12px;
            letter-spacing: 1px;
        }

        /* Grids & Cards */
        .tab-content {
            display: none;
            width: 100%;
            max-width: 1400px;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.4s ease forwards;
        }
        .tab-content.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid {
            display: grid;
            width: 100%;
            margin-bottom: 30px;
            gap: 16px;
            grid-auto-flow: dense; 
        }
        .grid-emojis { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
        
        .grid-emojis .card:nth-child(7n) { grid-column: span 2; grid-row: span 2; }
        .grid-emojis .card:nth-child(7n) .emoji-char { font-size: 4.5rem; }
        .grid-emojis .card:nth-child(12n) { grid-column: span 2; }

        @media (max-width: 600px) {
            .grid-emojis { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
            .grid-emojis .card:nth-child(7n) { grid-column: span 1; grid-row: span 1; }
            .grid-emojis .card:nth-child(7n) .emoji-char { font-size: 2.8rem; }
            .grid-emojis .card:nth-child(12n) { grid-column: span 1; }
        }

        #fontGridContainer {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            width: 100%;
            grid-auto-flow: dense;
        }

        .font-section-header {
            grid-column: 1 / -1;
            width: 100%;
            font-size: 1.2rem;
            color: var(--accent-color);
            margin: 20px 0 5px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
        }

        .live-preview-container {
            width: 100%;
            padding: 24px;
            margin-bottom: 20px;
            text-align: center;
            box-sizing: border-box;
            border: 1px dashed var(--accent-color);
        }
        
        .live-preview-text {
            font-size: 2rem;
            color: var(--accent-hover);
            font-weight: bold;
            word-break: break-all;
        }

        .card {
            padding: 18px 12px;
            display: flex;
            flex-direction: column;
            transition: all var(--transition);
            position: relative;
            will-change: transform;
            overflow: hidden;
            cursor: pointer;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(120deg, transparent 20%, rgba(255,255,255,0.15), transparent 80%);
            opacity: 0;
            transition: 0.5s ease;
            pointer-events: none;
            z-index: 1;
        }

        .card:hover::before { opacity: 1; transform: translateX(20%); }
        .card:hover {
            transform: translateY(-8px) scale(1.05);
            border-color: var(--border-focus);
            box-shadow: 0 0 25px rgba(187, 134, 252, 0.2), 0 15px 35px rgba(0,0,0,0.3);
            z-index: 5;
        }
        .card > * { position: relative; z-index: 2; }

        .card-emoji-center { align-items: center; text-align: center; }

        .emoji-char {
            font-size: 2.8rem; 
            line-height: 1;
            margin-bottom: 10px;
            font-family: "Noto Color Emoji", "Apple Color Emoji", "Segoe UI Emoji", sans-serif;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .card:hover .emoji-char { transform: scale(1.15) translateY(-5px); }

        .emoji-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            text-transform: capitalize;
            line-height: 1.3;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        .skin-tone-selector {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        body.light .skin-tone-selector { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.1); }

        .skin-swatch {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(128, 128, 128, 0.3);
        }
        .skin-swatch:hover { transform: scale(1.3); box-shadow: 0 0 8px var(--accent-color); }

        .font-name {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .font-display {
            font-size: 1.25rem;
            color: var(--text-primary);
            margin-bottom: 20px;
            word-break: break-all;
            min-height: 60px;
            line-height: 1.5;
            font-family: var(--unicode-font-stack);
        }

        .degraded-warning {
            font-size: 0.75rem;
            color: #ffb74d;
            background: rgba(255, 183, 77, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-weight: 600;
        }

        .btn-group { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: auto; }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 14px;
            font-size: 0.8rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            backdrop-filter: blur(5px);
        }
        body.light .btn { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.1); }
        .btn:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--accent-color); }
        body.light .btn:hover { background: rgba(0,0,0,0.08); }
        .btn:active { transform: scale(0.96); }

        .btn-primary { background: rgba(187, 134, 252, 0.15); color: var(--accent-hover); border-color: rgba(187, 134, 252, 0.3); }
        body.light .btn-primary { background: rgba(108, 92, 231, 0.1); color: var(--accent-color); }
        .btn-primary:hover { background: rgba(187, 134, 252, 0.25); color: #fff; box-shadow: 0 4px 15px rgba(187, 134, 252, 0.25); }
        body.light .btn-primary:hover { color: #111; }
        .btn-success { background: var(--success-bg) !important; color: var(--success-color) !important; border-color: var(--success-color) !important; }

        .os-variants {
            display: none;
            justify-content: space-around;
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px inset rgba(255,255,255,0.05);
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        .os-variants.active { display: flex; animation: fadeIn 0.2s ease; }
        .os-icon { display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; color: var(--text-secondary); font-weight: 600; }
        .os-icon img { width: 28px; height: 28px; margin-bottom: 6px; transition: transform 0.2s; }
        .os-icon img:hover { transform: scale(1.2); }

        .loading, .no-results {
            text-align: center;
            color: var(--text-secondary);
            font-size: 1.1rem;
            padding: 50px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            grid-column: 1 / -1;
        }

        #sentinel, #fontSentinel { height: 40px; width: 100%; margin-top: 20px; grid-column: 1 / -1; }
    </style>
</head>
<body>

    <header>
        <h1 class="header-title">
            <lord-icon src="https://cdn.lordicon.com/lupuorrc.json" trigger="loop" delay="2000" colors="primary:#bb86fc" style="width:45px;height:45px;"></lord-icon>
            Acemoji
        </h1>
        <div class="header-controls">
            <div class="stats-badge glass" id="statsBadge">Initializing Global Database...</div>
            <button id="themeToggle" class="btn" style="padding: 8px 16px; font-size: 0.75rem; width: auto;">Toggle Theme</button>
        </div>
    </header>

    <div class="tabs glass">
        <button class="tab-btn active" onclick="switchTab('emoji-tab', this)">Emojis</button>
        <button class="tab-btn" onclick="switchTab('font-tab', this)">Fonts</button>
    </div>

    <div class="search-container glass">
        <div class="search-icon">
            <lord-icon src="https://cdn.lordicon.com/xfftqfpt.json" trigger="hover" colors="primary:#bb86fc" style="width:24px;height:24px"></lord-icon>
        </div>
        <input type="text" id="searchInput" class="search-input" placeholder="Search emojis or type text..." autocomplete="off">
    </div>

    <div id="emoji-tab" class="tab-content active">
        <div class="glass featured-card" id="featuredCard">
            <div class="featured-emoji" id="featuredEmoji">вЬ®</div>
            <h2 class="featured-title" id="featuredName">Select an Emoji</h2>
            <div class="featured-meta" id="featuredMeta">U+0000 вАҐ Unicode 15.1</div>
            <button class="btn btn-primary" id="featuredCopyBtn" style="max-width: 200px; margin-top: 10px;">
                Copy to Clipboard
            </button>
        </div>

        <div class="category-scroll" id="emojiCategories">
            <div class="category-pill glass active" onclick="filterEmojiCategory('All', this)">All Emojis</div>
        </div>

        <div id="loadingIndicator" class="loading">
            <lord-icon src="https://cdn.lordicon.com/xjovhxra.json" trigger="loop" colors="primary:#bb86fc" style="width:50px;height:50px"></lord-icon>
            Fetching Unicode 15.1 Data...
        </div>
        <div class="grid grid-emojis" id="emojiGrid"></div>
        <div id="sentinel"></div>
    </div>

    <div id="font-tab" class="tab-content">
        <div class="live-preview-container glass">
            <div class="live-preview-text" id="livePreviewText">Acemoji Text</div>
        </div>
        
        <div class="category-scroll" id="fontCategories">
            <div class="category-pill glass active" onclick="scrollToFontCategory('Mathematical')">Mathematical</div>
            <div class="category-pill glass" onclick="scrollToFontCategory('Calligraphy')">Calligraphy</div>
            <div class="category-pill glass" onclick="scrollToFontCategory('Enclosed')">Enclosed</div>
            <div class="category-pill glass" onclick="scrollToFontCategory('Decorated')">Decorations</div>
            <div class="category-pill glass" onclick="scrollToFontCategory('Glitch')">Glitch</div>
        </div>
        
        <div id="fontGridContainer"></div>
    </div>

    <script>
        // --- 0. THEME TOGGLE LOGIC ---
        const toggleBtn = document.getElementById('themeToggle');
        toggleBtn.onclick = () => {
            document.body.classList.toggle('light');
            localStorage.setItem("theme", document.body.classList.contains('light') ? 'light' : 'dark');
        };
        if (localStorage.getItem("theme") === "light") document.body.classList.add("light");

        // --- 1. PREMIUM PARALLAX ENGINE (Hardware Accelerated) ---
        let ticking = false;
        document.addEventListener("mousemove", (e) => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    const x = (e.clientX / window.innerWidth - 0.5) * 15;
                    const y = (e.clientY / window.innerHeight - 0.5) * 15;
                    document.querySelectorAll(".card").forEach(card => {
                        if(!card.matches(':hover')) card.style.transform = `translate(${x}px, ${y}px)`;
                    });
                    ticking = false;
                });
                ticking = true;
            }
        });

        // --- 2. CORE DATA STRUCTURES & CONFIG ---
        let allEmojis = [];
        let filteredEmojis = [];
        let currentEmojiCategory = 'All';
        let renderLimit = 0;
        const CHUNK_SIZE = 120;
        const emojiCache = new Map();

        const normalChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        
        const baseAlphabets = {
            'Normal': 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789',

                const data = await res.json();
                
                const uniqueGroups = new Set();
                allEmojis = data.map(e => {
                    const category = e.category || 'Symbols';
                    uniqueGroups.add(category);
                    return {
                        char: e.char || e.codes.split(' ').map(c=>String.fromCodePoint(parseInt(c,16))).join(''),
                        name: e.name,
                        group: category,
                        subgroup: e.subcategory || '',
                        skins: e.name.includes("skin tone") || (e.skin_tone_support || false),
                        version: "15.1" 
                    };
                });

                uniqueGroups.forEach(group => {
                    const pill = document.createElement('div');
                    pill.className = 'category-pill glass';
                    pill.innerText = group.split(' & ')[0]; 
                    pill.onclick = function() { filterEmojiCategory(group, this); };
                    emojiCategoryBox.appendChild(pill);
                });

                filteredEmojis = [...allEmojis];
                statsBadge.innerText = `${allEmojis.length} Unicode 15.1 Emojis`;
                document.getElementById('loadingIndicator').style.display = 'none';
                renderChunk();
                setupIntersectionObserver();
            } catch (err) {
                console.error(err);
                statsBadge.innerText = 'Dataset Load Error';
            }
        }

        // --- 5. EMOJI RENDER LOGIC ---
        function scoreMatch(name, term) {
            if (name.startsWith(term)) return 3;
            if (name.includes(term)) return 2;
            return 1;
        }

        function filterEmojiCategory(group, pillElement) {
            document.querySelectorAll('#emojiCategories .category-pill').forEach(p => p.classList.remove('active'));
            pillElement.classList.add('active');
            currentEmojiCategory = group;
            emojiGrid.innerHTML = '';
            renderLimit = 0;
            applySearchAndFilter();
        }

        function applySearchAndFilter() {
            const term = searchInput.value.toLowerCase().trim();
            
            filteredEmojis = allEmojis.filter(emoji => {
                const matchesSearch = term === '' || emoji.name.toLowerCase().includes(term) || emoji.group.toLowerCase().includes(term);
                const matchesCategory = currentEmojiCategory === 'All' || emoji.group === currentEmojiCategory;
                return matchesSearch && matchesCategory;
            });

            if (term !== '') {
                filteredEmojis.sort((a, b) => scoreMatch(b.name.toLowerCase(), term) - scoreMatch(a.name.toLowerCase(), term));
            }

            emojiGrid.innerHTML = '';
            renderLimit = 0;
            if (filteredEmojis.length > 0) renderChunk();
        }

        window.setFeatured = function(char, name, hex, version) {
            const panel = document.getElementById('featuredCard');
            panel.style.display = 'flex';
            document.getElementById('featuredEmoji').innerText = char;
            document.getElementById('featuredName').innerText = name;
            document.getElementById('featuredMeta').innerText = `${hex} вАҐ Unicode ${version}`;
            
            const copyBtn = document.getElementById('featuredCopyBtn');
            copyBtn.onclick = () => copyText(copyBtn, char);
            
            panel.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }

        function renderChunk() {
            if (renderLimit >= filteredEmojis.length) return;

            const performRender = () => {
                const fragment = document.createDocumentFragment();
                const chunk = filteredEmojis.slice(renderLimit, renderLimit + CHUNK_SIZE);

                chunk.forEach((emoji, index) => {
                    const globalIndex = renderLimit + index;
                    const hexCode = getCodePoint(emoji.char);
                    
                    if (emojiCache.has(emoji.char)) {
                        fragment.appendChild(emojiCache.get(emoji.char));
                        return;
                    }

                    const card = document.createElement('div');
                    card.className = 'card glass card-emoji-center';
                    card.onclick = (e) => {
                        if(e.target.tagName !== 'BUTTON' && !e.target.classList.contains('skin-swatch')) {
                            setFeatured(emoji.char, emoji.name, hexCode, emoji.version);
                        }
                    };
                    
                    const skinToneUI = emoji.skins ? `
                        <div class="skin-tone-selector">
                            <div class="skin-swatch" style="background:#fadcbc" onclick="applySkinTone('${emoji.char}', 'рЯПї', '${globalIndex}')"></div>
                            <div class="skin-swatch" style="background:#e0bb95" onclick="applySkinTone('${emoji.char}', 'рЯПЉ', '${globalIndex}')"></div>
                            <div class="skin-swatch" style="background:#bf8f68" onclick="applySkinTone('${emoji.char}', 'рЯПљ', '${globalIndex}')"></div>
                            <div class="skin-swatch" style="background:#9b643d" onclick="applySkinTone('${emoji.char}', 'рЯПЊ', '${globalIndex}')"></div>
                            <div class="skin-swatch" style="background:#594640" onclick="applySkinTone('${emoji.char}', 'рЯПњ', '${globalIndex}')"></div>
                        </div>
                    ` : '';

                    card.innerHTML = `
                        <div class="emoji-char" id="emoji-char-${globalIndex}">${emoji.char}</div>
                        ${skinToneUI}
                        <div class="emoji-name">${emoji.name}</div>
                        
                        <div class="os-variants" id="os-${globalIndex}">
                            <div class="os-icon"><img src="https://emojicdn.elk.sh/${emoji.char}?style=apple" alt="Apple" onerror="this.parentElement.style.display='none'"><span>Apple</span></div>
                            <div class="os-icon"><img src="https://emojicdn.elk.sh/${emoji.char}?style=twitter" alt="Twitter" onerror="this.parentElement.style.display='none'"><span>Twemoji</span></div>
                        </div>

                        <div class="btn-group">
                            <button class="btn" onclick="document.getElementById('os-${globalIndex}').classList.toggle('active')">
                                Compare OS
                            </button>
                            <button class="btn btn-primary" id="copy-btn-${globalIndex}" onclick="copyText(this, '${emoji.char}')">
                                Copy
                            </button>
                        </div>
                    `;
                    
                    emojiCache.set(emoji.char, card);
                    fragment.appendChild(card);
                });

                emojiGrid.appendChild(fragment);
                renderLimit += CHUNK_SIZE;
            };

            window.requestIdleCallback ? requestIdleCallback(performRender) : setTimeout(performRender, 0);
        }

        // --- 6. UTILITIES & TAB AWARENESS ---
        window.applySkinTone = function(baseChar, toneChar, indexId) {
            const finalChar = baseChar.replace(/[\u{1F3FB}-\u{1F3FF}]/u, '') + toneChar;
            document.getElementById(`emoji-char-${indexId}`).innerText = finalChar;
            document.getElementById(`copy-btn-${indexId}`).setAttribute('onclick', `copyText(this, '${finalChar}')`);
        }

        function setupIntersectionObserver() {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) renderChunk();
            }, { rootMargin: '400px' });
            observer.observe(document.getElementById('sentinel'));
        }

        window.copyText = async function(button, text) {
            try {
                await navigator.clipboard.writeText(text);
                const originalHTML = button.innerHTML;
                button.innerHTML = 'Copied! вЬ®';
                button.classList.add('btn-success');
                setTimeout(() => { button.innerHTML = originalHTML; button.classList.remove('btn-success'); }, 1500);
            } catch (err) { button.innerText = 'Error'; }
        }

        // FIX: Tab Lifecycle Awareness 
        window.switchTab = function(tabId, btnElement) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');

            if (tabId === 'font-tab') {
                renderFonts(searchInput.value, true);
            }
        }

        // FIX: Aggressive Debouncing
        searchInput.addEventListener('input', (e) => {
            if (document.getElementById('emoji-tab').classList.contains('active')) {
                applySearchAndFilter();
            }
            document.getElementById('livePreviewText').innerText = e.target.value || "Acemoji Text";
            
            clearTimeout(window.fontRenderTimeout);
            window.fontRenderTimeout = setTimeout(() => {
                if (document.getElementById('font-tab').classList.contains('active')) {
                    renderFonts(e.target.value, true);
                }
            }, 500);
        });

        // --- 7. REWRITTEN VIRTUALIZED FONT ENGINE ---
        function applyMultiDecor(text, decorators) {
             const MAX = 2; 
             const mods = decorators.substring(0, MAX);
             return Array.from(text).map(c => mods.split('').reduce((acc, d) => acc + d, c)).join('');
        }

        function safeNormalize(text) {
            return text.normalize("NFKD").replace(/[\u0300-\u036f]+/g, '');
        }

        function generateFontString(text, fontObj) {
            let result = '';
            let isDegraded = false;
            const mapArr = Array.from(fontObj.map);
            const textArray = Array.from(fontObj.mod === 'reverse' ? text.split('').reverse().join('') : text);
            
            for (let char of textArray) {
                const index = normalChars.indexOf(char);
                let newChar = index !== -1 ? mapArr[index] : char;
                
                if (fontObj.mod && !['reverse', 'zalgo1', 'zalgo2'].includes(fontObj.mod)) {
                    newChar = applyMultiDecor(safeNormalize(newChar), fontObj.mod);
                }
                
                if (!canRender(newChar)) {
                    newChar = char;
                    isDegraded = true;
                }
                result += newChar;
            }

            if (fontObj.mod === 'zalgo1') {
                result = Array.from(result).map(c => {
                    if (canRender(c + '\u030d')) return c + '\u030d';
                    isDegraded = true; return c;
                }).join('');
            }
            return { text: result, isDegraded };
        }

        // FIX: Virtualized Font Renderer with chunks
        let fontRenderIndex = 0;
        const FONT_CHUNK = 20;
        const fontGridContainer = document.getElementById('fontGridContainer');
        
        // FIX: Sentinel injected for fonts
        const fontSentinel = document.createElement("div");
        fontSentinel.id = "fontSentinel";
        
        const fontObserver = new IntersectionObserver(entries => {
            if (entries[0].isIntersecting && document.getElementById('font-tab').classList.contains('active')) {
                renderFonts(searchInput.value, false);
            }
        }, { rootMargin: "400px" });

        function renderFonts(inputText, reset = true) {
            if (reset) {
                fontGridContainer.innerHTML = '';
                fontRenderIndex = 0;
            }
            
            const textToConvert = inputText.trim() || "Acemoji Text";
            const chunk = flattenedFontData.slice(fontRenderIndex, fontRenderIndex + FONT_CHUNK);
            if (chunk.length === 0) return;

            const fragment = document.createDocumentFragment();

            chunk.forEach(item => {
                if (item.type === 'header') {
                    const header = document.createElement('div');
                    header.className = 'font-section-header';
                    header.id = item.id;
                    header.innerText = item.text;
                    fragment.appendChild(header);
                } else {
                    const generatedData = generateFontString(textToConvert, item);
                    const fancyText = generatedData.text;
                    const degradedWarningHtml = generatedData.isDegraded ? `
                        <div class="degraded-warning">Limited support</div>
                    ` : '';

                    const card = document.createElement('div');
                    card.className = 'card glass';
                    card.innerHTML = `
                        <div class="font-name">${item.name}</div>
                        ${degradedWarningHtml}
                        <div class="font-display">${fancyText}</div>
                        <div class="btn-group">
                            <button class="btn btn-primary" onclick="copyText(this, \`${fancyText.replace(/\\/g, '\\\\').replace(/`/g, '\\`')}\`)">
                                Copy Font
                            </button>
                        </div>
                    `;
                    fragment.appendChild(card);
                }
            });

            fontGridContainer.appendChild(fragment);
            fontRenderIndex += FONT_CHUNK;

            // Maintain Sentinel at the bottom of the grid
            fontGridContainer.appendChild(fontSentinel);
            fontObserver.observe(fontSentinel);
        }

        window.scrollToFontCategory = function(catName) {
            document.querySelectorAll('#fontCategories .category-pill').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            
            // Force render until header is found if it hasn't rendered yet
            const targetId = `font-cat-${catName}`;
            let attempts = 0;
            while (!document.getElementById(targetId) && fontRenderIndex < flattenedFontData.length && attempts < 10) {
                renderFonts(searchInput.value, false);
                attempts++;
            }
            
            const target = document.getElementById(targetId);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        
        fetchOfficialEmojis();
    </script>
</body>
