<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acemoji - Aesthetic Edition</title>
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
    <style>
        /* Premium Blurple Theme */
        :root {
            --bg-color: #0d0c14;
            --surface-color: #1a1726;
            --surface-hover: #231f33;
            --border-color: rgba(187, 134, 252, 0.15);
            --border-focus: rgba(187, 134, 252, 0.5);
            --text-primary: #ffffff;
            --text-secondary: #a39eb5;
            --accent-color: #bb86fc;
            --accent-hover: #d4b3ff;
            --success-color: #03dac6;
            --success-bg: rgba(3, 218, 198, 0.1);
            --border-radius: 12px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Fallback font stack for Unicode Math/Script rendering (Fixes the Tofu issue) */
            --unicode-font-stack: "Noto Sans Math", "Apple Symbols", "Segoe UI Symbol", "Cambria Math", system-ui, sans-serif;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top, rgba(187, 134, 252, 0.05) 0%, transparent 40%);
            color: var(--text-primary);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 24px;
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-title {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }

        .stats-badge {
            font-size: 0.8rem;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 20px;
            color: var(--text-secondary);
            margin-top: 12px;
            font-weight: 600;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            background: var(--surface-color);
            padding: 8px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
            width: 100%;
            max-width: 450px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-secondary);
            border-radius: 10px;
            cursor: pointer;
            transition: all var(--transition);
        }

        .tab-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            background: rgba(187, 134, 252, 0.15);
            color: var(--accent-color);
            box-shadow: inset 0 0 0 1px var(--border-focus);
        }

        /* Search */
        .search-container {
            width: 100%;
            max-width: 700px;
            margin-bottom: 20px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 18px 20px 18px 55px;
            font-size: 1.05rem;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            color: var(--text-primary);
            box-sizing: border-box;
            transition: all var(--transition);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(187, 134, 252, 0.15);
            background: #211d30;
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
        }

        /* Category Pills (Scrollable) */
        .category-scroll {
            width: 100%;
            max-width: 1200px;
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            gap: 10px;
            padding-bottom: 15px;
            margin-bottom: 20px;
            scrollbar-width: none; /* Firefox */
        }
        
        .category-scroll::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .category-pill {
            background: var(--surface-color);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            flex-shrink: 0;
        }

        .category-pill:hover {
            border-color: var(--accent-color);
            color: var(--text-primary);
        }

        .category-pill.active {
            background: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
            box-shadow: 0 4px 10px rgba(187, 134, 252, 0.3);
        }

        /* Grids */
        .tab-content {
            display: none;
            width: 100%;
            max-width: 1400px;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.4s ease forwards;
        }

        .tab-content.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid {
            display: grid;
            gap: 20px;
            width: 100%;
            margin-bottom: 30px;
        }

        .grid-emojis { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
        .grid-fonts { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }

        .font-section-header {
            width: 100%;
            font-size: 1.2rem;
            color: var(--accent-color);
            margin: 30px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            font-weight: bold;
        }

        /* Cards */
        .card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
            position: relative;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--border-focus);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            background: var(--surface-hover);
            z-index: 2;
        }

        .card-emoji-center {
            align-items: center;
            text-align: center;
        }

        .emoji-char {
            font-size: 3.5rem;
            margin-bottom: 15px;
            font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
            transition: transform 0.3s;
        }

        .card:hover .emoji-char {
            transform: scale(1.15);
        }

        .emoji-name {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
            text-transform: capitalize;
            min-height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.3;
        }

        .emoji-group {
            font-size: 0.75rem;
            color: var(--accent-color);
            margin-bottom: 16px;
            background: rgba(187, 134, 252, 0.1);
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: bold;
        }

        .font-name {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        /* Important Fix: Added complex unicode font stack */
        .font-display {
            font-size: 1.25rem;
            color: var(--text-primary);
            margin-bottom: 20px;
            word-break: break-all;
            min-height: 3rem;
            line-height: 1.5;
            font-family: var(--unicode-font-stack);
        }

        /* Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin-top: auto;
        }

        .btn {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-primary {
            background: rgba(187, 134, 252, 0.1);
            color: var(--accent-hover);
            border-color: rgba(187, 134, 252, 0.3);
        }

        .btn-primary:hover {
            background: rgba(187, 134, 252, 0.2);
            border-color: var(--accent-color);
            color: #fff;
        }

        .btn-success {
            background: var(--success-bg) !important;
            color: var(--success-color) !important;
            border-color: var(--success-color) !important;
        }

        /* OS Variants */
        .os-variants {
            display: none;
            justify-content: space-around;
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        .os-variants.active { display: flex; animation: fadeIn 0.2s ease; }

        .os-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .os-icon img {
            width: 28px;
            height: 28px;
            margin-bottom: 6px;
            transition: transform 0.2s;
        }

        .os-icon img:hover { transform: scale(1.2); }

        .loading, .no-results {
            text-align: center;
            color: var(--text-secondary);
            font-size: 1.1rem;
            padding: 50px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* Infinite Scroll Sentinel */
        #sentinel {
            height: 40px;
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="header-title">
            <lord-icon src="https://cdn.lordicon.com/lupuorrc.json" trigger="loop" delay="2000" colors="primary:#bb86fc" style="width:45px;height:45px;"></lord-icon>
            Acemoji

        <div class="stats-badge" id="statsBadge">Initializing Global Database...</div>

    <div class="tabs">

    <div class="search-container">

        <div class="grid grid-emojis" id="emojiGrid"></div>
        <div id="sentinel"></div>

        </div>
        
        <div id="fontGridContainer" style="width: 100%;"></div>
    </div>

        };

        const specialFonts = {
            'Circled': 'ⒶⒷⒸⒹⒺⒻⒼⒽⒾⒿⓀⓁⓂⓃⓄⓅⓆⓇⓈⓉⓊⓋⓌⓍⓎⓏⓐⓑⓒⓓⓔⓕⓖⓗⓘⓙⓚⓛⓜⓝⓞⓟⓠⓡⓢⓣⓤⓥⓦⓧⓨⓩ⓪①②③④⑤⑥⑦⑧⑨',
            'Neg Circled': '🅐🅑🅒🅓🅔🅕🅖🅗🅘🅙🅚🅛🅜🅝🅞🅟🅠🅡🅢🅣🅤🅥🅦🅧🅨🅩🅐🅑🅒🅓🅔🅕🅖🅗🅘🅙🅚🅛🅜🅝🅞🅟🅠🅡🅢🅣🅤🅥🅦🅧🅨🅩0123456789',
            'Squared': '🄰🄱🄲🄳🄴🄵🄶🄷🄸🄹🄺🄻🄼🄽🄾🄿🅀🅁🅂🅃🅄🅅🅆🅇🅈🅉🄰🄱🄲🄳🄴🄵🄶🄷🄸🄹🄺🄻🄼🄽🄾🄿🅀🅁🅂🅃🅄🅅🅆🅇🅈🅉0123456789',
            'Parenthesized': '⒜⒝⒞⒟⒠⒡⒢⒣⒤⒥⒦⒧⒨⒩⒪⒫⒬⒭⒮⒯⒰⒱⒲⒳⒴⒵⒜⒝⒞⒟⒠⒡⒢⒣⒤⒥⒦⒧⒨⒩⒪⒫⒬⒭⒮⒯⒰⒱⒲⒳⒴⒵⑴⑵⑶⑷⑸⑹⒧⒨⒩',
            'Fullwidth': 'ＡＢＣＤＥＦＧＨＩＪＫＬＭＮＯＰＱＲＳＴＵＶＷＸＹＺａｂｃｄｅｆｇｈｉｊｋｌｍｎｏｐｑｒｓｔｕｖｗｘｙｚ０１２３４５６７８９',
            'Leetspeak': '48CD3F6H1JKLMN0PQR57UVWXY248cd3f6h1jklmn0pqr57uvwxy20123456789',
            'Upside Down': '∀qƆpƎℲפHIſʞ˥WNOԀQᴚS⊥∩ΛMX⅄Zɐqɔpǝɟƃɥıɾʞlɯuodbɹsʇnʌʍxʎz0123456789'
        };

        const categorizedFonts = {
            'Mathematical': [],
            'Calligraphy': [],
            'Enclosed': [],
            'Decorated': [],
            'Glitch': []
        };

        // Classify Fonts for Categories
        Object.keys(baseAlphabets).forEach(baseName => {
            if(baseName === 'Normal') return;
            
            let cat = 'Mathematical';
            if(['Script', 'Script Bold', 'Fraktur', 'Fraktur Bold', 'Small Caps'].includes(baseName)) cat = 'Calligraphy';
            if(baseName === 'Double Struck') cat = 'Enclosed';

            Object.keys(decorators).forEach(decName => {
                const fullName = decName ? `${baseName} ${decName}` : baseName;
                const fontObj = { name: fullName, map: baseAlphabets[baseName], mod: decorators[decName] };
                if (decName) categorizedFonts['Decorated'].push(fontObj);
                else categorizedFonts[cat].push(fontObj);
            });
        });

        Object.keys(specialFonts).forEach(specName => {
            let cat = 'Enclosed';
            if(['Leetspeak', 'Upside Down'].includes(specName)) cat = 'Glitch';
            categorizedFonts[cat].push({ name: specName, map: specialFonts[specName], mod: specName === 'Upside Down' ? 'reverse' : '' });
        });
        
        categorizedFonts['Glitch'].push({ name: 'Zalgo Light', map: baseAlphabets['Normal'], mod: 'zalgo1' });
        categorizedFonts['Glitch'].push({ name: 'Zalgo Heavy', map: baseAlphabets['Normal'], mod: 'zalgo2' });

        // --- 2. DOM ELEMENTS ---
        const emojiGrid = document.getElementById('emojiGrid');
        const fontGridContainer = document.getElementById('fontGridContainer');
        const searchInput = document.getElementById('searchInput');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const sentinel = document.getElementById('sentinel');
        const statsBadge = document.getElementById('statsBadge');
        const emojiCategoryBox = document.getElementById('emojiCategories');

        // --- 3. DATA FETCHING ---
        async function fetchOfficialEmojis() {
            try {
                const response = await fetch('https://unpkg.com/unicode-emoji-json@0.4.0/data-by-emoji.json');
                const data = await response.json();
                
                let uniqueGroups = new Set();

                allEmojis = Object.keys(data).map(char => {
                    uniqueGroups.add(data[char].group);
                    return {
                        char: char,
                        name: data[char].name,
                        group: data[char].group
                    };
                });

                // Generate Emoji Category Pills dynamically
                uniqueGroups.forEach(group => {
                    const pill = document.createElement('div');
                    pill.className = 'category-pill';
                    pill.innerText = group;
                    pill.onclick = function() { filterEmojiCategory(group, this); };
                    emojiCategoryBox.appendChild(pill);
                });

                filteredEmojis = [...allEmojis];
                statsBadge.innerText = `${allEmojis.length} Emojis Loaded`;
                loadingIndicator.style.display = 'none';
                
                renderChunk();
                setupIntersectionObserver();
            } catch (error) {
                console.error("Fetch failed, fallback.", error);
                allEmojis = [
                    { char: '😀', name: 'grinning face', group: 'Smileys & Emotion' },
                    { char: '🚀', name: 'rocket', group: 'Travel & Places' },
                    { char: '💻', name: 'laptop', group: 'Objects' },
                    { char: '🔥', name: 'fire', group: 'Activities' },
                    { char: '❤️', name: 'red heart', group: 'Smileys & Emotion' }
                ];
                filteredEmojis = [...allEmojis];
                statsBadge.innerText = 'Offline Mode';
                loadingIndicator.style.display = 'none';
                renderChunk();
            }
        }

        // --- 4. RENDER LOGIC ---

        function filterEmojiCategory(group, pillElement) {
            // Update active pill styling
            document.querySelectorAll('#emojiCategories .category-pill').forEach(p => p.classList.remove('active'));
            pillElement.classList.add('active');
            
            currentEmojiCategory = group;
            emojiGrid.innerHTML = '';
            renderLimit = 0;
            
            applySearchAndFilter();
        }

        function applySearchAndFilter() {
            const term = searchInput.value.toLowerCase().trim();
            
            filteredEmojis = allEmojis.filter(emoji => {
                const matchesSearch = term === '' || emoji.name.toLowerCase().includes(term) || emoji.group.toLowerCase().includes(term);
                const matchesCategory = currentEmojiCategory === 'All' || emoji.group === currentEmojiCategory;
                return matchesSearch && matchesCategory;
            });

            emojiGrid.innerHTML = '';
            renderLimit = 0;

            if (filteredEmojis.length === 0) {
                emojiGrid.innerHTML = `
                    <div class="no-results">
                        <lord-icon src="https://cdn.lordicon.com/msoeawqm.json" trigger="loop" colors="primary:#a39eb5" style="width:40px;height:40px"></lord-icon>
                        No emojis found matching criteria.
                    </div>`;
            } else {
                renderChunk();
            }
        }

        function renderChunk() {
            if (renderLimit >= filteredEmojis.length) return;

            const fragment = document.createDocumentFragment();
            const chunk = filteredEmojis.slice(renderLimit, renderLimit + CHUNK_SIZE);

            chunk.forEach((emoji, index) => {
                const globalIndex = renderLimit + index;
                const card = document.createElement('div');
                card.className = 'card card-emoji-center';
                
                // Using Twemoji (twitter) instead of google to avoid "creepy" blobs
                card.innerHTML = `
                    <div class="emoji-char">${emoji.char}</div>
                    <div class="emoji-name">${emoji.name}</div>
                    <div class="emoji-group">${emoji.group}</div>
                    
                    <div class="os-variants" id="os-${globalIndex}">
                        <div class="os-icon"><img src="https://emojicdn.elk.sh/${emoji.char}?style=apple" alt="Apple" onerror="this.parentElement.style.display='none'"><span>Apple</span></div>
                        <div class="os-icon"><img src="https://emojicdn.elk.sh/${emoji.char}?style=twitter" alt="Twitter" onerror="this.parentElement.style.display='none'"><span>Twemoji</span></div>
                        <div class="os-icon"><img src="https://emojicdn.elk.sh/${emoji.char}?style=samsung" alt="Samsung" onerror="this.parentElement.style.display='none'"><span>Samsung</span></div>
                    </div>

                    <div class="btn-group">
                        <button class="btn" onclick="document.getElementById('os-${globalIndex}').classList.toggle('active')">
                            <lord-icon src="https://cdn.lordicon.com/qwwyypgk.json" trigger="hover" colors="primary:#ffffff" style="width:16px;height:16px"></lord-icon>
                            Compare
                        </button>
                        <button class="btn btn-primary" onclick="copyText(this, '${emoji.char}')">
                            <lord-icon src="https://cdn.lordicon.com/nocovwne.json" trigger="hover" colors="primary:#bb86fc" style="width:16px;height:16px"></lord-icon>
                            Copy Emoji
                        </button>
                    </div>
                `;
                fragment.appendChild(card);
            });

            emojiGrid.appendChild(fragment);
            renderLimit += CHUNK_SIZE;
        }

        // Tofu-Safe Font Generator (Handles surrogate pairs properly using Array.from)
        function generateFontString(text, fontObj) {
            let result = '';
            // Critical fix for missing chars: split input and mapping map via Array.from to preserve surrogate pairs
            let mapArr = Array.from(fontObj.map);
            let toProcess = fontObj.mod === 'reverse' ? text.split('').reverse().join('') : text;
            let textArray = Array.from(toProcess); 
            
            for (let char of textArray) {
                const index = normalChars.indexOf(char);
                let newChar = index !== -1 ? mapArr[index] : char;
                
                if (fontObj.mod && !['reverse', 'zalgo1', 'zalgo2'].includes(fontObj.mod)) {
                    newChar += fontObj.mod;
                }
                result += newChar;
            }

            if (fontObj.mod === 'zalgo1') result = Array.from(result).map(c => c + '\u030d\u0324').join('');
            if (fontObj.mod === 'zalgo2') result = Array.from(result).map(c => c + '\u030d\u030e\u0304\u0310\u0324\u0317\u032d').join('');
            
            return result;
        }

        function renderFonts(inputText) {
            fontGridContainer.innerHTML = '';
            const textToConvert = inputText.trim() === '' ? 'Acemoji Text' : inputText;

            Object.keys(categorizedFonts).forEach(cat => {
                const header = document.createElement('div');
                header.className = 'font-section-header';
                header.id = `font-cat-${cat}`;
                header.innerText = cat;
                fontGridContainer.appendChild(header);

                const grid = document.createElement('div');
                grid.className = 'grid grid-fonts';

                categorizedFonts[cat].forEach(fontObj => {
                    const fancyText = generateFontString(textToConvert, fontObj);
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    card.innerHTML = `
                        <div class="font-name">${fontObj.name}</div>
                        <div class="font-display">${fancyText}</div>
                        <div class="btn-group">
                            <button class="btn btn-primary" onclick="copyText(this, \`${fancyText.replace(/\\/g, '\\\\').replace(/`/g, '\\`')}\`)">
                                <lord-icon src="https://cdn.lordicon.com/nocovwne.json" trigger="hover" colors="primary:#bb86fc" style="width:16px;height:16px"></lord-icon>
                                Copy Format
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                fontGridContainer.appendChild(grid);
            });
        }

        // --- 5. UTILITIES & EVENT LISTENERS ---

        function setupIntersectionObserver() {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) renderChunk();
            }, { rootMargin: '300px' });
            observer.observe(sentinel);
        }

        window.copyText = async function(button, text) {
            try {
                await navigator.clipboard.writeText(text);
                const originalHTML = button.innerHTML;
                button.innerHTML = 'Copied! ✨';
                button.classList.add('btn-success');
                setTimeout(() => {
                    button.innerHTML = originalHTML;
                    button.classList.remove('btn-success');
                }, 1500);
            } catch (err) {
                button.innerText = 'Error';
            }
        }

        window.switchTab = function(tabId, btnElement) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        window.scrollToFontCategory = function(catName) {
            document.querySelectorAll('#fontCategories .category-pill').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            
            const target = document.getElementById(`font-cat-${catName}`);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        searchInput.addEventListener('input', (e) => {
            applySearchAndFilter();
            renderFonts(e.target.value);
        });

        // --- 6. INITIALIZATION ---
        fetchOfficialEmojis();
        renderFonts('Acemoji Text');

    </script>
</body>
</html>
